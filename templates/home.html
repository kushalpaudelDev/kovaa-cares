<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kovaa Cares | Smart Pet Platform</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f8;
        }

        .container {
            max-width: 900px;
            margin: 80px auto;
            text-align: center;
        }

        .hero {
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            margin: 5px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
        }

        .admin { background: #2c3e50; }
        .pets { background: #27ae60; }
        .book { background: #2980b9; }

        .grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>

<div class="container">

    <div class="hero">

        <h1>🐾 Kovaa Cares</h1>

        <p>
            Smart pet care platform for managing pets, appointments, and services efficiently.
        </p>

        <a href="{% url 'admin:index' %}" class="btn admin">Admin Panel</a>
        <a href="/pets/" class="btn pets">View Pets</a>
        <a href="/appointments/" class="btn book">Appointments</a>

    </div>

    <div class="grid">

        <div class="card">
            <h3>🐶 Pets</h3>
            <p>Manage all registered pets</p>
        </div>

        <div class="card">
            <h3>📅 Appointments</h3>
            <p>Track bookings & schedule</p>
        </div>

        <div class="card">
            <h3>⚙ System</h3>
            <p>Admin controls & settings</p>
        </div>

    </div>

</div>

</body>

</html>
