<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kovaa Cares | Pet Care Platform</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .box {
            width: 420px;
            margin: 120px auto;
            padding: 30px;
            background-color: white;
            border: 1px solid #ddd;
        }

        h1 {
            font-size: 26px;
            color: #222;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        .emoji {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            font-size: 12px;
            padding: 6px 10px;
            border: 1px solid #2e7d32;
            color: #2e7d32;
        }

</head>

<body>

    <div class="box">
        <div class="emoji">🐾</div>

        <h1>Welcome to Kovaa Cares</h1>

        <p>
            A simple pet care platform built for managing pets, appointments, and services in one place.
        </p>

        <div class="status">Project Running</div>
    </div>

</html>
