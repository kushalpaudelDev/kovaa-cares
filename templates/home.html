<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kovaa Cares | Pet Care Platform</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .container {
            width: 450px;
            margin: 120px auto;
            padding: 35px;
            background-color: #ffffff;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 26px;
            color: #222;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .status {
            display: inline-block;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #2e7d32;
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .admin-btn {
            display: inline-block;
            padding: 12px 18px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
            transition: 0.3s ease;
        }

        .admin-btn:hover {
            background-color: #1f2d3a;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="emoji">🐾</div>

        <h1>Welcome to Kovaa Cares</h1>

        <p>
            A modern pet care platform designed to manage pets, appointments, and services efficiently in one place.
        </p>

        <div class="status">Project Running</div>

        <br><br>

        <a href="{% url 'admin:index' %}" class="admin-btn">
            Go to Admin Panel
        </a>

    </div>

</body>

</html>
