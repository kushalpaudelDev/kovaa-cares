<h2>Register</h2>

<form method="post">
    {% csrf_token %}
    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>

<a href="{% url 'login' %}">Already have account? Login</a>
