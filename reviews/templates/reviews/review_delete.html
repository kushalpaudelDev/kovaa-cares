{% extends 'base.html' %}

{% block title %}Delete Review | Kovaa Cares{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Delete Review</h1>
    <p>Are you sure you want to delete the review by {{ review.user.username }}?</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="button">Confirm Delete</button>
            <a href="{% url 'review_list' %}" class="button secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
