{% extends 'base.html' %}

{% block title %}Delete Pet | Kovaa Cares{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Delete Pet</h1>
    <p>Are you sure you want to delete "{{ pet.name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="button">Yes, Delete</button>
            <a href="{% url 'pet_list' %}" class="button secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
